version: 0.2
# REBUILD21 — Inference Lambda 빌드
# HANDLER 환경변수: 'py' (ONNX) 또는 'gguf' (llama-cpp-python). 기본 'py'.
# MODELS 환경변수로 빌드할 모델 목록.

env:
  variables:
    HANDLER: "py"
    MODELS: "qwen35-4b"
    S3_MODEL_BUCKET: "aitutor-models-794531974010"

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
      - |
        for M in $MODELS; do
          REPO="aitutor-inference-$M"
          aws ecr describe-repositories --repository-names $REPO --region $AWS_DEFAULT_REGION 2>/dev/null \
            || aws ecr create-repository --repository-name $REPO --region $AWS_DEFAULT_REGION
        done
      - cd scripts/inference-handler-${HANDLER}
      - pwd && ls -la

  build:
    commands:
      - |
        for M in $MODELS; do
          echo "===== Build $M ($HANDLER) ====="
          REPO_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/aitutor-inference-$M
          rm -rf model
          mkdir -p model
          aws s3 sync "s3://${S3_MODEL_BUCKET}/$M/" "model/" --quiet
          du -sh model/
          docker build --build-arg MODEL_KEY=$M -t aitutor-inference-$M:latest .
          docker tag aitutor-inference-$M:latest ${REPO_URI}:latest
          docker push ${REPO_URI}:latest
          docker rmi aitutor-inference-$M:latest ${REPO_URI}:latest 2>/dev/null || true
          rm -rf model
          docker system prune -f --volumes
        done

  post_build:
    commands:
      - echo "Done"
