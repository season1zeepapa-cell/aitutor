# AI TutorTwo — Cloud Build 자동화 (REBUILD23 / REBUILD31 마이그)
#
# 호출:
#   gcloud builds submit --config cloudbuild.yaml --project=aitutortwo-prod
#
# 동작:
#   1) Docker image 빌드 (Dockerfile multi-stage — Vite 빌드 + CUDA runtime)
#   2) Artifact Registry 에 푸시 (asia-southeast1)
#   3) Cloud Run 서비스 배포 (GPU L4, min=0, max=1, asia-southeast1)
#
# 배포 후:
#   - Cloud Run URL 출력 → capacitor.config.json 갱신
#   - 첫 호출 콜드 스타트 ~30~60s (GPU + Ollama 모델 다운로드)
#
# REBUILD31 (2026-05-04) — 신규 GCP (aitutortwo-prod / asia-southeast1) 마이그
#   - 구: aifactory-494108 / us-east4
#   - 격리 service URL 은 Phase 5-3 격리 배포 후 갱신 필수

substitutions:
  _SERVICE_NAME: aitutor
  _AR_REGION: asia-southeast1      # REBUILD31 — Artifact Registry (싱가포르, 한국 RTT ~80ms)
  _RUN_REGION: asia-southeast1     # REBUILD31 — Cloud Run GPU L4 가용 리전 중 한국 최단
  _REPO: aitutor
  _SA_EMAIL: aitutor-run@aitutortwo-prod.iam.gserviceaccount.com
  _GCS_BUCKET: aitutor-files-aitutortwo-prod
  # 격리 추론 service URL — REBUILD32 Ollama 단일 엔진
  #   현 spec: aitutor-server-infer (별도 image, 24Gi/4CPU/L4 GPU, REBUILD33 §17 quota 승인 후 24Gi 복구)
  _ISO_INFER_URL: https://aitutor-server-infer-xq3ezzqwfa-as.a.run.app
  _TAG: latest    # 호출 시 --substitutions=_TAG=v$(date +%Y%m%d-%H%M%S) 로 override 권장

steps:
  # 1) Docker 이미지 빌드 (multi-stage — vite build + CUDA runtime)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      - 'build'
      - '-t'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:${_TAG}'
      - '-t'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # 2) Artifact Registry 푸시
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push-sha'
    args: ['push', '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:${_TAG}']
    waitFor: ['docker-build']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push-latest'
    args: ['push', '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest']
    waitFor: ['docker-build']

  # 3) Cloud Run 배포 (GPU L4 + min=0)
  #    ※ 첫 배포 후 capacitor.config.json 의 server.url 을 출력된 *.run.app 으로 갱신할 것
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'cloud-run-deploy'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:${_TAG}
      - --region=${_RUN_REGION}
      - --service-account=${_SA_EMAIL}
      # 메인 service 자원: 24Gi/6vCPU/L4 GPU (Cloud Run 6 vCPU 한도에서 가능한 최대 메모리)
      # REBUILD33: Express + Ollama 단일 엔진 (Python sub-server / vLLM / llama-cpp-python 제거됨)
      - --memory=24Gi
      - --cpu=6
      - --gpu=1
      - --gpu-type=nvidia-l4
      - --no-gpu-zonal-redundancy
      - --no-cpu-throttling
      - --timeout=600
      - --concurrency=10
      - --min-instances=0
      - --max-instances=1
      - --port=8080
      # REBUILD30 §25 (2026-05-03) — ISO_INFER_URL 추가 (격리 service 호출용)
      #   --set-env-vars 는 명시 vars 만 남기고 나머지를 제거하므로,
      #   격리 service URL 도 여기 명시하지 않으면 매 배포 후 사라짐 (사용자 보고 사례).
      - --set-env-vars=GCS_FILES_BUCKET=${_GCS_BUCKET},NODE_ENV=production,ISO_INFER_URL=${_ISO_INFER_URL}
      - --update-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,AUTH_TOKEN_SECRET=AUTH_TOKEN_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,HF_API_KEY=HF_API_KEY:latest,LAW_API_OC=LAW_API_OC:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest
      - --allow-unauthenticated
    waitFor: ['docker-push-sha']

# REBUILD32 — 격리 service 별도 image 분리.
#   격리: workspace/aitutor/server-infer/ (Ollama only, 24Gi/4CPU/L4) → 별도 cloudbuild.yaml
#   메인: 본 cloudbuild 가 책임. 격리 service 변경 시 server-infer/ 에서 별도 gcloud builds submit 호출.

images:
  - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:${_TAG}'
  - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest'

# Cloud Build 머신 — Docker build 가 큰 컨테이너라 E2_HIGHCPU_8 추천
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s
